services:
  baikal:
    container_name: baikal
    image: ckulka/baikal:latest
    restart: unless-stopped
    networks:
      - proxy_network
    ports:
      - "8888:80"
    volumes:
      - ./baikal/config:/var/www/baikal/config
      - ./baikal/data:/var/www/baikal/Specific

networks:
  proxy_network:
    name: proxy_network
    external: true
