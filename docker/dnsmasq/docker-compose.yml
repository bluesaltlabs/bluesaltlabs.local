services:
  dnsmasq:
    image: dockurr/dnsmasq
    container_name: dnsmasq
    environment:
      DNS1: "192.168.50.23"
      # DNS2: "1.1.1.1"
    volumes:
      - ./dnsmasq.d/:/etc/dnsmasq.d/
    ports:
      - "192.168.50.85:53:53/udp"
      - "192.168.50.85:53:53/tcp"
    networks:
      - proxy_network
    cap_add:
      - NET_ADMIN
    restart: always

volumes:
  dnsmasq:
    driver: local
networks:
  proxy_network:
    name: proxy_network
    driver: bridge
